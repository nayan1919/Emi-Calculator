<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EMI Calculator — Calculate your Equated Monthly Installment for home loans, car loans, personal loans and more. View amortization schedule and interest breakdown.">
    <meta name="keywords" content="EMI Calculator, Loan Calculator, Home Loan, Car Loan, Personal Loan, Interest Calculator">
    <title>EMI Calculator — Loan Installment Planner</title>

    <!-- Google Fonts — Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="app-header" role="banner">
        <div class="header-inner">
            <div class="logo" aria-label="EMI Calculator">
                <span class="logo-icon" aria-hidden="true">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="5" width="20" height="14" rx="2"/>
                        <line x1="2" y1="10" x2="22" y2="10"/>
                    </svg>
                </span>
                <h1>EMI Calculator</h1>
            </div>
            <div class="header-controls">
                <!-- Currency Selector -->
                <div class="currency-selector" role="group" aria-label="Currency selection">
                    <label for="currency-select" class="sr-only">Select Currency</label>
                    <select id="currency-select" aria-label="Currency">
                        <option value="INR" selected>₹ INR</option>
                        <option value="USD">$ USD</option>
                        <option value="EUR">€ EUR</option>
                        <option value="GBP">£ GBP</option>
                    </select>
                </div>
                <!-- Theme Toggle -->
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light mode" title="Toggle theme">
                    <span class="theme-icon sun" aria-hidden="true">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                        </svg>
                    </span>
                    <span class="theme-icon moon" aria-hidden="true">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </span>
                </button>
                <!-- Built for Digital Heroes -->
                <a href="https://digitalheroesco.com/" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;justify-content:center;margin-left:10px;padding:8px 16px;background-color:#6c5ce7;color:#ffffff;font-family:Inter,sans-serif;font-size:13px;font-weight:600;text-decoration:none;border-radius:8px;white-space:nowrap;">Built for Digital Heroes</a>
            </div>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="app-main" role="main">

        <!-- Input + Results Grid -->
        <div class="calculator-grid">

            <!-- ===== INPUT CARD ===== -->
            <section class="card input-card" aria-label="Loan input parameters">
                <h2 class="card-title">
                    <span class="card-title-icon" aria-hidden="true">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                        </svg>
                    </span>
                    Loan Details
                </h2>

                <!-- Loan Amount -->
                <div class="input-group" id="loan-amount-group">
                    <div class="input-header">
                        <label for="loan-amount">Loan Amount</label>
                        <div class="input-value-wrapper">
                            <span class="currency-symbol" aria-hidden="true">₹</span>
                            <input type="text" id="loan-amount" class="value-input" value="10,00,000" inputmode="numeric" aria-describedby="loan-amount-error" autocomplete="off">
                        </div>
                    </div>
                    <input type="range" id="loan-amount-slider" class="slider" min="10000" max="10000000" step="10000" value="1000000" aria-label="Loan amount slider">
                    <div class="slider-labels">
                        <span>10K</span>
                        <span>1Cr</span>
                    </div>
                    <span class="error-message" id="loan-amount-error" role="alert" aria-live="polite"></span>
                </div>

                <!-- Interest Rate -->
                <div class="input-group" id="interest-rate-group">
                    <div class="input-header">
                        <label for="interest-rate">Interest Rate (p.a.)</label>
                        <div class="input-value-wrapper">
                            <input type="text" id="interest-rate" class="value-input rate-input" value="8.5" inputmode="decimal" aria-describedby="interest-rate-error" autocomplete="off">
                            <span class="unit-symbol" aria-hidden="true">%</span>
                        </div>
                    </div>
                    <input type="range" id="interest-rate-slider" class="slider" min="1" max="30" step="0.1" value="8.5" aria-label="Interest rate slider">
                    <div class="slider-labels">
                        <span>1%</span>
                        <span>30%</span>
                    </div>
                    <span class="error-message" id="interest-rate-error" role="alert" aria-live="polite"></span>
                </div>

                <!-- Loan Tenure -->
                <div class="input-group" id="loan-tenure-group">
                    <div class="input-header">
                        <label for="loan-tenure">Loan Tenure</label>
                        <div class="input-value-wrapper">
                            <input type="text" id="loan-tenure" class="value-input tenure-input" value="20" inputmode="numeric" aria-describedby="loan-tenure-error" autocomplete="off">
                            <!-- Tenure Unit Toggle -->
                            <div class="tenure-toggle" role="radiogroup" aria-label="Tenure unit">
                                <button type="button" class="toggle-btn active" data-unit="years" role="radio" aria-checked="true">Yr</button>
                                <button type="button" class="toggle-btn" data-unit="months" role="radio" aria-checked="false">Mo</button>
                            </div>
                        </div>
                    </div>
                    <input type="range" id="loan-tenure-slider" class="slider" min="1" max="30" step="1" value="20" aria-label="Loan tenure slider">
                    <div class="slider-labels">
                        <span id="tenure-min-label">1 Yr</span>
                        <span id="tenure-max-label">30 Yr</span>
                    </div>
                    <span class="error-message" id="loan-tenure-error" role="alert" aria-live="polite"></span>
                </div>

                <!-- Reset Button -->
                <button type="button" id="reset-btn" class="reset-btn" aria-label="Reset all values to defaults">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                    </svg>
                    Reset
                </button>
            </section>

            <!-- ===== RESULTS SECTION ===== -->
            <section class="results-section" aria-label="Calculation results">

                <!-- Result Cards -->
                <div class="result-cards">
                    <div class="result-card emi-card" id="result-emi">
                        <span class="result-label">Monthly EMI</span>
                        <span class="result-value" id="emi-value" aria-live="polite">₹0</span>
                    </div>
                    <div class="result-card interest-card" id="result-interest">
                        <span class="result-label">Total Interest</span>
                        <span class="result-value" id="interest-value" aria-live="polite">₹0</span>
                    </div>
                    <div class="result-card total-card" id="result-total">
                        <span class="result-label">Total Payment</span>
                        <span class="result-value" id="total-value" aria-live="polite">₹0</span>
                    </div>
                </div>

                <!-- Doughnut Chart -->
                <div class="card chart-card">
                    <h2 class="card-title">
                        <span class="card-title-icon" aria-hidden="true">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/>
                            </svg>
                        </span>
                        Payment Breakdown
                    </h2>
                    <div class="chart-container">
                        <canvas id="emi-chart" aria-label="Doughnut chart showing principal vs interest breakdown" role="img"></canvas>
                    </div>
                    <div class="chart-legend" id="chart-legend">
                        <div class="legend-item">
                            <span class="legend-dot principal-dot" aria-hidden="true"></span>
                            <span class="legend-label">Principal</span>
                            <span class="legend-value" id="legend-principal">₹0</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot interest-dot" aria-hidden="true"></span>
                            <span class="legend-label">Interest</span>
                            <span class="legend-value" id="legend-interest">₹0</span>
                        </div>
                    </div>
                </div>
            </section>

        </div>

        <!-- ===== AMORTIZATION SCHEDULE ===== -->
        <section class="card amortization-card" aria-label="Amortization schedule">
            <button type="button" class="amortization-toggle" id="amortization-toggle" aria-expanded="false" aria-controls="amortization-content">
                <h2 class="card-title">
                    <span class="card-title-icon" aria-hidden="true">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>
                        </svg>
                    </span>
                    Amortization Schedule
                </h2>
                <span class="toggle-chevron" aria-hidden="true">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                </span>
            </button>
            <div class="amortization-content" id="amortization-content" hidden>
                <!-- View Toggle -->
                <div class="amort-view-toggle" role="radiogroup" aria-label="Schedule view">
                    <button type="button" class="view-btn active" data-view="yearly" role="radio" aria-checked="true">Yearly</button>
                    <button type="button" class="view-btn" data-view="monthly" role="radio" aria-checked="false">Monthly</button>
                </div>
                <div class="table-wrapper">
                    <table id="amortization-table" aria-label="Loan amortization schedule">
                        <thead>
                            <tr>
                                <th scope="col" id="col-period">Year</th>
                                <th scope="col" id="col-principal">Principal</th>
                                <th scope="col" id="col-interest">Interest</th>
                                <th scope="col" id="col-total-payment">Total Payment</th>
                                <th scope="col" id="col-balance">Balance</th>
                            </tr>
                        </thead>
                        <tbody id="amortization-body">
                            <!-- Rows generated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="app-footer" role="contentinfo">
        <p>Built with precision. EMI = [P × R × (1+R)<sup>N</sup>] / [(1+R)<sup>N</sup> − 1]</p>
    </footer>

    <!-- Script -->
    <script src="script.js"></script>
</body>
</html>
